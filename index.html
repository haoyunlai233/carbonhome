<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>碳中和小屋 | 储能电路演示：光伏控制器与蓄电池能量流动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #e0f0e8 0%, #c8e0d4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', 'Poppins', system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        .demo-container {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(2px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px rgba(0, 20, 0, 0.3);
            padding: 1.2rem;
            border: 1px solid rgba(120, 180, 100, 0.5);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 1.8rem;
            background: #fefef7;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            width: 100%;
            height: auto;
        }

        .control-bar {
            margin-top: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            align-items: center;
        }

        button {
            background: #2c5e2e;
            border: none;
            padding: 0.7rem 1.6rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 3rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            transform: scale(1.02);
            background: #1f4521;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .active-mode {
            background: #e68a2e;
            box-shadow: 0 0 0 2px #ffdd99, 0 4px 12px black;
        }

        .mode-status {
            background: #1e2a1ecc;
            backdrop-filter: blur(8px);
            padding: 0.5rem 1rem;
            border-radius: 3rem;
            font-weight: bold;
            color: #f9f3cf;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.2rem;
            margin-top: 1rem;
            font-size: 0.7rem;
            background: #e9f3e6;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            color: #1f3b1a;
        }

        .legend span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .flow-dot {
            width: 12px;
            height: 12px;
            background: #f5b042;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 4px gold;
        }
        .flow-dot.green {
            background: #3bc43b;
            box-shadow: 0 0 6px #6eff6e;
        }
        .flow-dot.blue {
            background: #3a86ff;
            box-shadow: 0 0 6px #7ab3ff;
        }

        @media (max-width: 700px) {
            .legend { font-size: 0.6rem; gap: 0.8rem; }
            button { padding: 0.4rem 1rem; font-size: 0.8rem;}
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 0.8rem;
            color: #2c5a2a;
        }
    </style>
</head>
<body>
<div>
    <div class="demo-container">
        <canvas id="energyCanvas" width="1100" height="680" style="width:100%; height:auto; max-width:1100px; aspect-ratio:1100/680"></canvas>

        <div class="control-bar">
            <button id="chargeBtn" class="active-mode">🔆 充电模式 <span style="font-size:0.8rem;">(太阳能→蓄电池)</span></button>
            <button id="dischargeBtn">⚡ 放电模式 <span style="font-size:0.8rem;">(蓄电池→用电器)</span></button>
            <div class="mode-status" id="modeText">🌱 当前：充电储能 · 光伏给电池充电</div>
        </div>

        <div class="legend">
            <span>🔆 太阳能板</span>
            <span>⚙️ 光伏控制器 (核心)</span>
            <span>🔋 蓄电池组</span>
            <span>🔌 USB拓展坞</span>
            <span>⚡ 24V变压器</span>
            <span>✨ <span class="flow-dot"></span> 能量粒子流向</span>
            <span>🎯 充电流向 <span class="flow-dot green"></span> → 电池储能</span>
            <span>💡 放电流向 <span class="flow-dot blue"></span> → 负载配电</span>
        </div>
        <footer>💡 电路特点：光伏控制器先为蓄电池充电 → 放电时，控制器通过USB拓展坞为5V设备供电，通过24V变压器为24V设备供电，逆变器直接从电池取电 | 点击按钮切换模式</footer>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('energyCanvas');
        const ctx = canvas.getContext('2d');

        const width = 1100, height = 680;
        canvas.width = width;
        canvas.height = height;

        // 元件坐标 (重新布局以容纳新元件)
        const nodes = {
            solar:      { x: 100, y: 160, label: "太阳能板", icon: "☀️" },
            control:    { x: 320, y: 160, label: "光伏控制器", icon: "⚙️" },
            battery:    { x: 560, y: 160, label: "蓄电池组", icon: "🔋" },
            // 新增中间设备
            usbHub:     { x: 270, y: 320, label: "USB 拓展坞", icon: "🔌" },
            trans24V:   { x: 610, y: 390, label: "24V 变压器", icon: "⚡" },
            // 负载
            load5V:     { x: 160, y: 500, label: "5V 用电器", icon: "📺" },
            load12V:    { x: 400, y: 560, label: "12V 用电器", icon: "💧" },
            load24V:    { x: 640, y: 560, label: "24V 用电器", icon: "❄️" },
            inverter:   { x: 860, y: 400, label: "220V 逆变器", icon: "⚡" }
        };

        const loadDetails = {
            load5V:   ["📺 电视", "🔊 音响", "💡 灯带", "🔋 移动电源"],
            load12V:  ["💧 水泵"],
            load24V:  ["❄️ 制冷压缩机", "🌀 小风扇", "🔄 换热器风扇"],
            inverter: ["💡 交流设备", "🔌 通用插座"]
        };

        // 充电模式路径：太阳能→控制器→蓄电池
        const getChargePaths = () => [
            { from: 'solar', to: 'control', color: '#FFB347', particleColor: '#f5b042', speed: 0.012, name: 'pvToCtrl' },
            { from: 'control', to: 'battery', color: '#6fbf4c', particleColor: '#3bc43b', speed: 0.012, name: 'ctrlToBat' }
        ];
        
        // 放电模式路径：
        // 蓄电池 → 控制器
        // 控制器 → USB拓展坞 → 5V负载（两段）
        // 控制器 → 12V负载（直接）
        // 控制器 → 24V变压器 → 24V负载（两段）
        // 蓄电池 → 逆变器（直接）
        const getDischargePaths = () => [
            { from: 'battery', to: 'control', color: '#3a86ff', particleColor: '#3a86ff', speed: 0.012, name: 'batToCtrl' },
            // 5V 路径：控制器 → USB拓展坞 → 5V负载
            { from: 'control', to: 'usbHub', color: '#3a86ff', particleColor: '#3a86ff', speed: 0.011, name: 'ctrlToUsb' },
            { from: 'usbHub', to: 'load5V', color: '#3a86ff', particleColor: '#3a86ff', speed: 0.011, name: 'usbTo5V' },
            // 12V 直接
            { from: 'control', to: 'load12V', color: '#3a86ff', particleColor: '#3a86ff', speed: 0.01, name: 'ctrlTo12V' },
            // 24V 路径：控制器 → 24V变压器 → 24V负载
            { from: 'control', to: 'trans24V', color: '#3a86ff', particleColor: '#3a86ff', speed: 0.011, name: 'ctrlToTrans' },
            { from: 'trans24V', to: 'load24V', color: '#3a86ff', particleColor: '#3a86ff', speed: 0.011, name: 'transTo24V' },
            // 逆变器直接从电池取电
            { from: 'battery', to: 'inverter', color: '#3a86ff', particleColor: '#3a86ff', speed: 0.01, name: 'batToInv' }
        ];

        let currentMode = 'charge';
        let pathManagers = [];
        let batterySOC = 45;

        function getNodePos(nodeId) {
            return nodes[nodeId] ? { x: nodes[nodeId].x, y: nodes[nodeId].y } : null;
        }

        class FlowParticle {
            constructor(t = 0, speed) {
                this.t = t;
                this.speed = speed;
                this.radius = 4;
            }
        }

        function rebuildPathsByMode() {
            let newPathDefs = [];
            if (currentMode === 'charge') {
                newPathDefs = getChargePaths();
            } else {
                newPathDefs = getDischargePaths();
            }
            
            const newManagers = [];
            for (const def of newPathDefs) {
                const fromPos = getNodePos(def.from);
                const toPos = getNodePos(def.to);
                if (!fromPos || !toPos) continue;
                newManagers.push({
                    pathDef: def,
                    fromPos: fromPos,
                    toPos: toPos,
                    length: Math.hypot(toPos.x - fromPos.x, toPos.y - fromPos.y),
                    particles: [],
                    speedBase: def.speed,
                });
            }
            pathManagers = newManagers;
        }

        function setMode(mode) {
            if (mode === currentMode) return;
            currentMode = mode;
            rebuildPathsByMode();
            const chargeBtn = document.getElementById('chargeBtn');
            const disBtn = document.getElementById('dischargeBtn');
            const modeSpan = document.getElementById('modeText');
            if (currentMode === 'charge') {
                chargeBtn.classList.add('active-mode');
                disBtn.classList.remove('active-mode');
                modeSpan.innerHTML = '🔆 充电模式 · 光伏板 → 控制器 → 蓄电池 (储能)';
            } else {
                disBtn.classList.add('active-mode');
                chargeBtn.classList.remove('active-mode');
                modeSpan.innerHTML = '⚡ 放电模式 · 蓄电池 → 控制器 → USB拓展坞(5V) / 24V变压器(24V) / 12V直连，逆变器直连电池';
            }
        }

        function updateBatteryByMode() {
            if (currentMode === 'charge') {
                batterySOC = Math.min(100, batterySOC + 0.25);
            } else {
                batterySOC = Math.max(0, batterySOC - 0.18);
            }
        }

        function updateParticles() {
            for (const mgr of pathManagers) {
                let spawnChance = 0.32;
                if (currentMode === 'discharge') {
                    // 让所有路径都有足够粒子
                    spawnChance = 0.35;
                }
                if (mgr.particles.length < 10 && Math.random() < spawnChance) {
                    mgr.particles.push(new FlowParticle(0, mgr.speedBase));
                }
                for (let i = 0; i < mgr.particles.length; i++) {
                    const p = mgr.particles[i];
                    p.t += p.speed;
                    if (p.t >= 1.0) {
                        mgr.particles.splice(i,1);
                        i--;
                    }
                }
            }
        }

        function drawBackgroundAndLines() {
            ctx.save();
            ctx.lineWidth = 2.5;
            ctx.setLineDash([8, 6]);
            ctx.strokeStyle = "#99aa99";
            ctx.globalAlpha = 0.6;
            
            // 太阳能 -> 控制器
            ctx.beginPath();
            ctx.moveTo(nodes.solar.x, nodes.solar.y);
            ctx.lineTo(nodes.control.x, nodes.control.y);
            ctx.stroke();
            
            // 控制器 <-> 蓄电池
            ctx.beginPath();
            ctx.moveTo(nodes.control.x, nodes.control.y);
            ctx.lineTo(nodes.battery.x, nodes.battery.y);
            ctx.stroke();
            
            // 控制器 -> USB拓展坞 -> 5V负载
            ctx.beginPath();
            ctx.moveTo(nodes.control.x, nodes.control.y);
            ctx.lineTo(nodes.usbHub.x, nodes.usbHub.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(nodes.usbHub.x, nodes.usbHub.y);
            ctx.lineTo(nodes.load5V.x, nodes.load5V.y);
            ctx.stroke();
            
            // 控制器 -> 12V负载（直接）
            ctx.beginPath();
            ctx.moveTo(nodes.control.x, nodes.control.y);
            ctx.lineTo(nodes.load12V.x, nodes.load12V.y);
            ctx.stroke();
            
            // 控制器 -> 24V变压器 -> 24V负载
            ctx.beginPath();
            ctx.moveTo(nodes.control.x, nodes.control.y);
            ctx.lineTo(nodes.trans24V.x, nodes.trans24V.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(nodes.trans24V.x, nodes.trans24V.y);
            ctx.lineTo(nodes.load24V.x, nodes.load24V.y);
            ctx.stroke();
            
            // 蓄电池 -> 逆变器
            ctx.beginPath();
            ctx.moveTo(nodes.battery.x, nodes.battery.y);
            ctx.lineTo(nodes.inverter.x, nodes.inverter.y);
            ctx.stroke();
            
            ctx.setLineDash([]);
            ctx.globalAlpha = 1;
        }

        function drawComponents() {
            // 绘制所有元件卡片
            for (const [key, node] of Object.entries(nodes)) {
                ctx.shadowBlur = 4;
                ctx.shadowColor = "rgba(0,0,0,0.1)";
                ctx.fillStyle = "#fcf9ea";
                ctx.strokeStyle = "#5b8c5a";
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(node.x - 58, node.y - 32, 116, 64, 14);
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.font = "22px 'Segoe UI Emoji'";
                ctx.fillStyle = "#2f5230";
                ctx.fillText(node.icon, node.x - 44, node.y - 6);
                ctx.font = "bold 14px 'Segoe UI'";
                ctx.fillStyle = "#1f3b24";
                ctx.fillText(node.label, node.x - 36, node.y + 18);
                
                if (key === 'battery') {
                    ctx.font = "bold 12px monospace";
                    ctx.fillStyle = "#2a5c3e";
                    ctx.fillText(`${Math.floor(batterySOC)}%`, node.x + 30, node.y - 12);
                    ctx.fillStyle = "#ccc";
                    ctx.fillRect(node.x - 30, node.y - 24, 60, 8);
                    ctx.fillStyle = batterySOC > 60 ? "#4caf50" : (batterySOC > 25 ? "#ffb347" : "#f44336");
                    ctx.fillRect(node.x - 30, node.y - 24, 60 * (batterySOC/100), 8);
                }
            }
            
            // 负载详细文字
            ctx.font = "10px 'Segoe UI'";
            ctx.fillStyle = "#2d5a2c";
            ctx.font = "bold 11px 'Segoe UI'";
            ctx.fillText("5V 直流负载", nodes.load5V.x-40, nodes.load5V.y+28);
            ctx.font = "9px system-ui";
            ctx.fillStyle = "#34623c";
            let detailY = nodes.load5V.y + 42;
            for(let item of loadDetails.load5V) {
                ctx.fillText(item, nodes.load5V.x-48, detailY);
                detailY += 12;
            }
            
            ctx.font = "bold 11px 'Segoe UI'";
            ctx.fillStyle = "#2d5a2c";
            ctx.fillText("12V 水泵", nodes.load12V.x-35, nodes.load12V.y+28);
            ctx.font = "9px system-ui";
            ctx.fillText(loadDetails.load12V[0], nodes.load12V.x-35, nodes.load12V.y+44);
            
            ctx.font = "bold 11px 'Segoe UI'";
            ctx.fillStyle = "#2d5a2c";
            ctx.fillText("24V 制冷/风扇", nodes.load24V.x-45, nodes.load24V.y+28);
            ctx.font = "9px system-ui";
            let yOff = nodes.load24V.y + 42;
            for(let item of loadDetails.load24V) {
                ctx.fillText(item, nodes.load24V.x-55, yOff);
                yOff += 11;
            }
            
            ctx.font = "bold 11px 'Segoe UI'";
            ctx.fillStyle = "#b45f2b";
            ctx.fillText("逆变器 220V", nodes.inverter.x-40, nodes.inverter.y+28);
            ctx.font = "9px system-ui";
            ctx.fillStyle = "#805e2c";
            ctx.fillText("交流供电", nodes.inverter.x-30, nodes.inverter.y+44);
            
            // 为USB拓展坞和24V变压器添加额外说明
            ctx.font = "9px monospace";
            ctx.fillStyle = "#3b6e4a";
            ctx.fillText("USB 5V 输出", nodes.usbHub.x-20, nodes.usbHub.y+38);
            ctx.fillText("24V 稳压输出", nodes.trans24V.x-20, nodes.trans24V.y+38);
            
            // 高亮控制器
            ctx.beginPath();
            ctx.arc(nodes.control.x, nodes.control.y, 42, 0, 2*Math.PI);
            ctx.strokeStyle = "#e5a03c";
            ctx.lineWidth = 2;
            ctx.setLineDash([4,6]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawFlowingParticles() {
            for (const mgr of pathManagers) {
                const { fromPos, toPos, particles, pathDef } = mgr;
                if (!fromPos || !toPos) continue;
                // 路径高亮
                ctx.beginPath();
                ctx.moveTo(fromPos.x, fromPos.y);
                ctx.lineTo(toPos.x, toPos.y);
                ctx.lineWidth = 3;
                ctx.strokeStyle = currentMode === 'charge' ? "#e9b35f" : "#6c9eff";
                ctx.globalAlpha = 0.35;
                ctx.stroke();
                ctx.globalAlpha = 1;
                
                for (const p of particles) {
                    const t = p.t;
                    const x = fromPos.x + (toPos.x - fromPos.x) * t;
                    const y = fromPos.y + (toPos.y - fromPos.y) * t;
                    let gradient = ctx.createRadialGradient(x-2, y-2, 2, x, y, 8);
                    if (currentMode === 'charge') {
                        gradient.addColorStop(0, '#ffe174');
                        gradient.addColorStop(1, '#f5a623');
                    } else {
                        gradient.addColorStop(0, '#8ab9ff');
                        gradient.addColorStop(1, '#2c62c9');
                    }
                    ctx.beginPath();
                    ctx.arc(x, y, 5, 0, 2*Math.PI);
                    ctx.fillStyle = gradient;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = currentMode === 'charge' ? "#ffbf40" : "#3a86ff";
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(x, y, 2.2, 0, 2*Math.PI);
                    ctx.fillStyle = "white";
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }
        }

        function drawFlowAnnotations() {
            ctx.font = "italic 12px 'Segoe UI'";
            ctx.fillStyle = "#3c5a2f";
            if (currentMode === 'charge') {
                ctx.fillText("⚡ 光伏能量 → 控制器 → 蓄电池充电", nodes.control.x-80, nodes.control.y-28);
                ctx.fillStyle = "#cf811e";
                ctx.fillText("🔋 储能中 ↑", nodes.battery.x+30, nodes.battery.y-30);
            } else {
                ctx.fillStyle = "#2c628f";
                ctx.fillText("🔋 蓄电池放电 → 控制器 → USB拓展坞(5V) / 24V变压器(24V)", nodes.control.x-150, nodes.control.y-32);
                ctx.fillStyle = "#1f6daf";
                ctx.fillText("⚡ 负载运行中", nodes.load5V.x-20, nodes.load5V.y+70);
            }
            ctx.font = "bold 10px monospace";
            ctx.fillStyle = "#3b7846";
            ctx.fillText("◈ 能量调度核心 ◈", nodes.control.x-35, nodes.control.y-45);
            // 标注新设备
            ctx.font = "9px monospace";
            ctx.fillStyle = "#3a86ff";
            ctx.fillText("🔌 5V通过USB拓展坞", nodes.usbHub.x-30, nodes.usbHub.y-18);
            ctx.fillText("⚡ 24V通过变压器", nodes.trans24V.x-30, nodes.trans24V.y-18);
        }

        function drawRelationGlow() {
            const ctrl = nodes.control;
            const bat = nodes.battery;
            ctx.beginPath();
            ctx.moveTo(ctrl.x, ctrl.y);
            ctx.lineTo(bat.x, bat.y);
            ctx.lineWidth = 4;
            ctx.strokeStyle = currentMode === 'charge' ? "#ffc107aa" : "#3a86ffaa";
            ctx.setLineDash([12, 8]);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.arc((ctrl.x+bat.x)/2, (ctrl.y+bat.y)/2, 8, 0, 2*Math.PI);
            ctx.fillStyle = currentMode === 'charge' ? "#ffd966cc" : "#6ea8fecc";
            ctx.fill();
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }

        function render() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "#fafef5";
            ctx.fillRect(0,0,width,height);
            for(let i=0;i<width;i+=30){
                ctx.beginPath();
                ctx.strokeStyle = "#cde2cd";
                ctx.lineWidth = 0.5;
                ctx.moveTo(i,0);
                ctx.lineTo(i,height);
                ctx.stroke();
                ctx.moveTo(0,i%height);
                ctx.lineTo(width,i%height);
                ctx.stroke();
            }
            drawBackgroundAndLines();
            drawComponents();
            drawRelationGlow();
            drawFlowingParticles();
            drawFlowAnnotations();
            
            ctx.font = "10px 'Segoe UI'";
            ctx.fillStyle = "#6b4c2c";
            ctx.fillText("🔌 USB 5V 充电口", nodes.load5V.x+30, nodes.load5V.y+28);
            ctx.fillText("🔋 移动电源直充", nodes.load5V.x+28, nodes.load5V.y+54);
        }

        function animate() {
            updateBatteryByMode();
            updateParticles();
            render();
            requestAnimationFrame(animate);
        }

        function init() {
            rebuildPathsByMode();
            document.getElementById('chargeBtn').addEventListener('click', () => {
                setMode('charge');
                rebuildPathsByMode();
            });
            document.getElementById('dischargeBtn').addEventListener('click', () => {
                setMode('discharge');
                rebuildPathsByMode();
            });
            animate();
        }
        init();
    })();
</script>
</body>
</html>
